description: >-
  Endo International was a specialty pharmaceutical company best known for
  Xiaflex (collagenase clostridium histolyticum), branded urology and
  orthopedic products, and a large sterile-injectables and generics business
  (Par Pharmaceutical). Endo filed Chapter 11 in August 2022 amid mass opioid
  litigation tied to its legacy Opana ER franchise, and emerged in April 2024
  as the private company Endo, Inc., owned by its former creditors. On
  July 31, 2025, Endo combined with Mallinckrodt; the merged group then
  separated in November 2025 into two independent companies — Keenova
  Therapeutics (specialty branded therapeutics, including the former Endo
  Xiaflex/urology/orthopedics portfolio and Mallinckrodt specialty brands)
  and Par Health (generics, sterile injectables, and pharmaceutical Active
  Pharmaceutical Ingredients manufacturing). Endo no longer operates as a
  standalone public-facing pharmaceutical company. There is no public
  developer program, OpenAPI specification, SDK, or technology API surface
  associated with Endo, the post-emergence Endo Inc, Keenova Therapeutics,
  or Par Health. Any references to "API" on the successor companies' sites
  refer to pharmaceutical Active Pharmaceutical Ingredients, not software
  application programming interfaces.
